<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiteSpeed - XRV LABS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

  :root {
    --bg-dark: #0a0a0f;
    --bg-card: #12131a;
    --accent-cyan: #00d4ff;
    --accent-purple: #8b5cf6;
    --text-primary: #ffffff;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border-color: rgba(255,255,255,0.06);
    --glow-cyan: rgba(0,212,255,0.4);
    --radius: 8px; /* Set to 8dp/px */
  }

  [data-theme="light"] {
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --text-primary: #1a1b24;
    --text-secondary: #475569;
    --border-color: rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.4s ease;
  }

  /* Futuristic BG Elements */
  .bg-elements { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: float 20s infinite ease-in-out; }
  .orb-1 { width: 400px; height: 400px; background: var(--accent-purple); top: -100px; left: -100px; }
  .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--border-color) 1px, transparent 1px), linear-gradient(90deg, var(--border-color) 1px, transparent 1px); background-size: 40px 40px; }
  @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, 30px); } }

  .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 20px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .brand h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .theme-toggle { background: var(--bg-card); border: 1px solid var(--border-color); padding: 8px; border-radius: var(--radius); cursor: pointer; color: var(--text-primary); }

  /* Network Bar */
  .network-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .net-item { background: var(--bg-card); border: 1px solid var(--border-color); padding: 15px; border-radius: var(--radius); display: flex; align-items: center; gap: 10px; }
  .net-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .net-value { font-size: 0.8rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* Speed Card with Lightning Border */
  .speed-card { 
    background: var(--bg-card); 
    border: 1px solid var(--border-color); 
    border-radius: var(--radius); 
    padding: 40px 20px; 
    margin-bottom: 20px; 
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Rotating Border Effect */
  .speed-card::before {
    content: "";
    position: absolute;
    inset: -150%;
    background: conic-gradient(from 0deg, transparent 0%, transparent 40%, var(--accent-cyan) 50%, var(--accent-purple) 60%, transparent 70%, transparent 100%);
    animation: rotate 2s linear infinite;
    display: none;
  }
  .speed-card::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: var(--bg-card);
    border-radius: calc(var(--radius) - 2px);
    z-index: 1;
  }
  .speed-card.is-testing::before { display: block; }
  .speed-content { position: relative; z-index: 2; }

  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .speed-value { font-family: 'JetBrains Mono', monospace; font-size: 4.5rem; font-weight: 800; line-height: 1; color: var(--text-primary); }
  .speed-unit { color: var(--text-muted); font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

  /* Metrics Grid - Forced 1 Row */
  .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
  .metric-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 12px 5px; text-align: center; }
  .m-title { font-size: 0.55rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
  .m-value { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--text-primary); }
  .m-unit { font-size: 0.6rem; color: var(--text-muted); margin-left: 2px; }

  /* Smart Button */
  .start-btn { 
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    color: #000; border: none; padding: 18px; border-radius: var(--radius); font-weight: 800;
    font-size: 0.9rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    transition: 0.3s; width: 100%; margin-top: 20px;
    box-shadow: 0 8px 20px var(--glow-cyan);
    font-family: 'JetBrains Mono', monospace;
  }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled { color: #fff; background: #222; box-shadow: none; cursor: default; }

  .ftr { padding: 30px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-secondary); opacity: 0.5; letter-spacing: 1px; }

  @media (max-width: 400px) {
    .speed-value { font-size: 3.5rem; }
    .m-value { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<div class="bg-elements">
  <div class="orb orb-1"></div>
  <div class="grid-bg"></div>
</div>

<div class="container">
  <header class="header">
    <div class="brand"><h1>LiteSpeed</h1></div>
    <button class="theme-toggle" id="themeBtn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"></path></svg>
    </button>
  </header>

  <div class="network-bar">
    <div class="net-item">
      <div>
        <div class="net-label">Provider</div>
        <div class="net-value" id="vIsp">Scanning...</div>
      </div>
    </div>
    <div class="net-item">
      <div>
        <div class="net-label">IP Address</div>
        <div class="net-value" id="vIp">--</div>
      </div>
    </div>
  </div>

  <div class="speed-card" id="speedCard">
    <div class="speed-content">
        <div class="speed-value" id="vDown">0.0</div>
        <div class="speed-unit">Mbps</div>
    </div>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <div class="m-title">Latency</div>
      <div class="m-value" id="vPing">--<span class="m-unit">ms</span></div>
    </div>
    <div class="metric-card">
      <div class="m-title">Jitter</div>
      <div class="m-value" id="vJitter">--<span class="m-unit">ms</span></div>
    </div>
    <div class="metric-card">
      <div class="m-title">Data</div>
      <div class="m-value" id="vData">--<span class="m-unit">MB</span></div>
    </div>
  </div>

  <button class="start-btn" id="startBtn" onclick="runTest()">Start Analysis</button>

  <div class="ftr">© 2026 XRV LABS • AKSHAR CHAUDHARY</div>
</div>

<script>
const CFG = { endpoint: 'https://speed.cloudflare.com/__down', duration: 10000 };
let S = { running: false, totalData: 0, smoothed: 0 };
let abortCtrl = null;

// Theme Logic
const themeBtn = document.getElementById('themeBtn');
themeBtn.onclick = () => {
  const mode = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', mode);
  localStorage.setItem('ls-theme', mode);
};
if(localStorage.getItem('ls-theme')) document.documentElement.setAttribute('data-theme', localStorage.getItem('ls-theme'));

async function fetchMeta() {
  try {
    const res = await fetch('https://speed.cloudflare.com/meta', { cache: 'no-store' });
    const data = await res.json();
    document.getElementById('vIsp').textContent = (data.asOrganization || 'Unknown').split(' ')[0];
    document.getElementById('vIp').textContent = data.clientIp;
  } catch (e) { document.getElementById('vIsp').textContent = 'Offline'; }
}
fetchMeta();

async function runTest() {
  if (S.running) return;
  S.running = true;
  
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const btn = document.getElementById('startBtn');
  const card = document.getElementById('speedCard');
  
  btn.disabled = true; 
  card.classList.add('is-testing');
  
  S.totalData = 0; S.smoothed = 0;

  try {
    btn.textContent = 'MEASURING PING...';
    let pings = [];
    for(let i=0; i<10; i++) {
      const t = performance.now();
      await fetch('https://speed.cloudflare.com/cdn-cgi/trace', {mode:'no-cors', cache:'no-store', signal: abortCtrl.signal});
      if(i > 0) pings.push(performance.now() - t);
      await new Promise(r => setTimeout(r, 40));
    }
    const minPing = Math.min(...pings);
    let jSum = 0; for(let i=1; i<pings.length; i++) jSum += Math.abs(pings[i] - pings[i-1]);
    
    document.getElementById('vPing').innerHTML = Math.round(minPing) + '<span class="m-unit">ms</span>';
    document.getElementById('vJitter').innerHTML = (jSum/(pings.length-1)).toFixed(1) + '<span class="m-unit">ms</span>';

    btn.textContent = 'TESTING BANDWIDTH...';
    await startDownload(abortCtrl.signal);
    
    btn.textContent = 'ANALYSIS COMPLETE';

  } catch(e) {}
  finally {
    btn.disabled = false;
    setTimeout(() => { if(!S.running) btn.textContent = 'RESTART SCAN'; }, 1500);
    card.classList.remove('is-testing');
    S.running = false;
  }
}

async function startDownload(signal) {
  const start = performance.now();
  const download = async () => {
    try {
      const resp = await fetch(CFG.endpoint + '?bytes=50000000', { cache: 'no-store', signal });
      const reader = resp.body.getReader();
      while(true) {
        const {done, value} = await reader.read();
        const elapsed = (performance.now() - start) / 1000;
        if(done || elapsed > (CFG.duration/1000)) { reader.cancel(); break; }
        S.totalData += value.length;
        const mbps = (S.totalData * 8 / (1024*1024)) / elapsed;
        if(elapsed > 0.2) {
          S.smoothed = S.smoothed === 0 ? mbps : (mbps * 0.8) + (S.smoothed * 0.2);
          document.getElementById('vDown').textContent = S.smoothed.toFixed(1);
          document.getElementById('vData').innerHTML = (S.totalData/1048576).toFixed(1) + '<span class="m-unit">MB</span>';
        }
      }
    } catch(e) {}
  };
  for(let i=0; i<3; i++) download();
  await new Promise(r => setTimeout(r, CFG.duration));
}
</script>
</body>
</html>
