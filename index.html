<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OmniInvoice | Business Lite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    screens: { 'xs': '380px' },
                    fontFamily: { 
                        'sans': ['Quantico', 'sans-serif'],
                        'signature': ['Dancing Script', 'cursive']
                    },
                    animation: { 'slide-up': 'slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards' },
                    keyframes: { slideUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } } }
                }
            }
        }
        if (!localStorage.getItem('inv_theme')) localStorage.setItem('inv_theme', 'light');
        if (localStorage.getItem('inv_theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
    
    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 0px); --brand-color: #6a1b9a; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Strict Horizontal Scroll Lock */
        html, body { 
            width: 100%; 
            max-width: 100%; 
            overflow-x: hidden; 
            overscroll-behavior-x: none; 
        }

        body { 
            font-family: 'Quantico', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc; 
            touch-action: manipulation; 
        }
        .dark body { background-color: #0f172a; }
        body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease; }
        button, h1, h2, h3, h4, h5, h6 { text-transform: uppercase !important; }
        
        /* Project 1 Theme Styles */
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid #e2e8f0; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.85); border-color: #334155; }
        .app-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; width: 100%; max-width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .field-input { padding: 10px 12px; border: 2px solid #cbd5e1; outline: none; border-radius: 5px; font-size: 14px; width: 100%; }
        .field-input:focus { border-color: #6a1b9a; }
        .dark .field-input { border-color: #475569; background: #1e293b; color: #f1f5f9; }
        .dark .field-input:focus { border-color: #a855f7; }
        
        .btn-primary { padding: 10px 16px; font-weight: 700; border-radius: 5px; font-size: 14px; transition: transform 0.1s; }
        .btn-primary:active { transform: translateY(2px); }
        .badge { padding: 4px 8px; font-size: 11px !important; font-weight: 700; text-transform: uppercase; white-space: nowrap; border-radius: 4px; }
        .stat-card { padding: 12px; border: 1px solid #e2e8f0; border-radius: 5px; }
        .dark .stat-card { border-color: #334155; }
        
        /* Global 10px Margin for all devices */
        #main-content { padding: 10px; padding-bottom: 80px; width: 100%; overflow-x: hidden; }
        #bottom-nav { padding-bottom: calc(var(--safe-bottom) + 4px); border-top: 1px solid #e2e8f0; height: 60px; width: 100%; }
        .dark #bottom-nav { border-top-color: #334155; }

        /* Project 2 Invoice Styles (Responsive Proportional Scaling) */
        .invoice-wrapper { 
            width: calc(100% + 24px); 
            margin-left: -12px;
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
            padding: 10px 0; 
            position: relative;
        }
        
        @media (min-width: 768px) {
            .invoice-wrapper { width: 100%; margin-left: 0; }
        }

        .invoice-card { 
            width: 800px; 
            min-height: 1131px; 
            flex-shrink: 0; 
            background: white !important; 
            color: black !important; 
            padding: 40px 20px; 
            box-sizing: border-box; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); 
            border: 1px solid #ccc; 
            transform-origin: top center; 
            margin: 0 auto;
        }
        .invoice-card * { transition: none !important; border-color: #222 !important; color: black !important; }
        
        .header-section { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 4px solid var(--brand-color) !important; padding-bottom: 15px; margin-bottom: 10px; }
        .owner-text { color: var(--brand-color) !important; font-size: 32px; margin: 0; font-weight: 700; text-transform: uppercase; }
        .inv-label-middle { text-align: center; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; width: 100%; margin-bottom: 20px; }
        .box-left { border: 1.5px solid #222; border-right: none; padding: 15px; }
        .box-right { border: 1.5px solid #222; padding: 15px; }
        .label-tag { font-size: 11px; font-weight: bold; text-transform: uppercase; background: #eee !important; padding: 2px 8px; display: inline-block; margin-bottom: 8px; border: 1px solid #ccc; }
        
        .table-box { border: 1.5px solid #222; width: 100%; border-collapse: collapse; margin-bottom: 20px; text-transform: uppercase; }
        .table-box th { background: #f0f0f0 !important; border-bottom: 1.5px solid #222; padding: 12px 10px; font-size: 12px; }
        .table-box td { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 14px; font-weight: 400; line-height: 1.4; }
        .table-box th:not(:last-child), .table-box td:not(:last-child) { border-right: 1px solid #ddd; }
        
        .footer-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 0; }
        .terms-box { border: 1.5px solid #222; border-right: none; padding: 15px; font-size: 10px; line-height: 1.8; }
        .totals-box { border: 1.5px solid #222; padding: 15px; background: #fcfcfc !important; }
        .total-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 1px dashed #ccc; }
        .highlight-total { margin-top: 5px; font-weight: 700; font-size: 20px; color: var(--brand-color) !important; border-bottom: none !important; }
        
        /* Printing Overrides */
        @media print {
            html, body { width: auto; max-width: none; overflow: visible; }
            body, .app-container, #view-main, #main-content { height: auto !important; overflow: visible !important; display: block !important; background: white !important; padding: 0 !important; }
            #main-header, #bottom-nav, .editor-dashboard, .no-print { display: none !important; }
            .invoice-wrapper { overflow: visible; padding: 0; display: block; height: auto !important; width: 100%; margin-left: 0; }
            .invoice-card { box-shadow: none; border: none; margin: 0; width: 100%; padding: 0; min-height: auto; transform: none !important; }
        }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100">

<div id="login-screen" class="fixed inset-0 bg-white dark:bg-slate-900 z-[100] flex flex-col items-center justify-center">
    <div class="glass-card p-8 rounded-[5px] flex flex-col items-center max-w-sm w-[90%] text-center border border-slate-200 dark:border-slate-800 shadow-xl">
        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mb-4">
            <i data-lucide="receipt" class="w-8 h-8 text-purple-600"></i>
        </div>
        <h1 class="text-2xl font-black text-purple-600 mb-2 uppercase">OmniInvoice</h1>
        <p class="text-xs text-slate-500 mb-8 font-bold uppercase tracking-widest">Business Lite</p>
        
        <button id="google-login-btn" class="flex items-center gap-3 bg-white text-slate-700 border border-slate-300 hover:bg-slate-50 font-bold py-3 px-6 rounded-[5px] shadow-sm w-full justify-center transition-colors">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
            SIGN IN WITH GOOGLE
        </button>
    </div>
</div>

<div id="app" class="app-container" style="display: none;">
    <section id="view-main" class="flex-1 flex flex-col overflow-hidden w-full max-w-full">
        
        <div class="flex-1 flex flex-col overflow-hidden w-full max-w-full">
            <header id="main-header" class="flex items-center justify-between bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-[10px] py-3 z-10 relative w-full">
                <h2 id="app-title" class="font-black text-base tracking-wide text-purple-600 dark:text-purple-400 truncate flex-1 pr-2">DASHBOARD</h2>
                <div class="flex items-center gap-3 flex-shrink-0">
                    <button onclick="toggleTheme()" class="w-9 h-9 rounded-[5px] border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                        <i id="theme-icon" data-lucide="sun" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>
            
            <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar relative w-full max-w-full"></main>
        </div>

        <nav id="bottom-nav" class="flex justify-around items-center bg-white dark:bg-slate-900 z-50 w-full relative">
            <button id="nav-btn-dashboard" onclick="switchTab('dashboard')" class="flex flex-col items-center gap-1 text-slate-400 p-2 w-16 transition-colors">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[11px] font-bold">Home</span>
            </button>
            
            <button onclick="switchTab('add-invoice')" class="flex flex-col items-center -mt-6 relative z-10 p-2">
                <div class="w-14 h-14 bg-purple-600 text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white dark:border-slate-900 transition-transform active:scale-95">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </div>
            </button>
            
            <button id="nav-btn-profile" onclick="switchTab('profile')" class="flex flex-col items-center gap-1 text-slate-400 p-2 w-16 transition-colors">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[11px] font-bold">Settings</span>
            </button>
        </nav>
    </section>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue, child } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4cSHDvhcHG9RB-XSytylFCoqr43DUZw0",
        authDomain: "xrv-business-lite.firebaseapp.com",
        databaseURL: "https://xrv-business-lite-default-rtdb.firebaseio.com",
        projectId: "xrv-business-lite",
        storageBucket: "xrv-business-lite.firebasestorage.app",
        messagingSenderId: "572956649078",
        appId: "1:572956649078:web:c036570f2ca9a78fd3e157"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Global App State
    window.currentUser = null;
    window.appData = {
        invoices: [],
        profile: { name: '', phone: '' }
    };
    window.currentTab = 'dashboard';
    window.viewingInvoiceId = null; 

    // Helpers
    const today = () => new Date().toISOString().split('T')[0];
    const fmt = n => '₹ ' + parseFloat(n).toLocaleString('en-IN');

    // DOM Elements
    const loginScreen = document.getElementById('login-screen');
    const appContainer = document.getElementById('app');
    const loginBtn = document.getElementById('google-login-btn');

    // --- Authentication & Data Sync ---
    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).catch(error => {
            console.error("Login Error:", error);
            alert("Failed to sign in: " + error.message);
        });
    });

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUser = user;
            loginScreen.style.display = 'none';
            appContainer.style.display = 'flex';

            // 1. Listen for Profile Changes
            const profileRef = ref(database, `users/${user.uid}/profile`);
            onValue(profileRef, (snapshot) => {
                let p = snapshot.val();
                
                // Set default data for new users instantly
                if (!p) {
                    p = { name: user.displayName || 'New User', phone: '1234567890' };
                    set(profileRef, p);
                }
                
                // Fallback if missing
                if(!p.phone) p.phone = '1234567890';
                
                window.appData.profile = p;

                // Update UI without full re-render to prevent focus loss while typing
                if (window.currentTab === 'profile') {
                    const nameInput = document.getElementById('p-name');
                    const phoneInput = document.getElementById('p-phone');
                    if (nameInput && document.activeElement !== nameInput) nameInput.value = p.name;
                    if (phoneInput && document.activeElement !== phoneInput) phoneInput.value = p.phone;
                } else if (window.currentTab === 'add-invoice') {
                    // Update signature field on invoice page if viewing it
                    const signInput = document.getElementById('iSignName');
                    if (signInput) signInput.value = p.name;
                }
            });

            // 2. Listen for Invoice Changes
            const invoicesRef = ref(database, `users/${user.uid}/invoices`);
            onValue(invoicesRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    window.appData.invoices = Object.values(data).sort((a,b) => a.id.localeCompare(b.id));
                } else {
                    window.appData.invoices = []; 
                }
                
                if (['dashboard'].includes(window.currentTab)) {
                    window.switchTab(window.currentTab); 
                }
            });

            // Initial Tab load
            window.switchTab('dashboard');

        } else {
            window.currentUser = null;
            loginScreen.style.display = 'flex';
            appContainer.style.display = 'none';
        }
    });

    // --- Application UI Logic ---
    window.switchTab = (tab) => {
        window.currentTab = tab;
        
        document.querySelectorAll('#bottom-nav button').forEach(b => b.classList.remove('text-purple-600', 'dark:text-purple-400'));
        const activeNav = document.getElementById('nav-btn-' + tab);
        if(activeNav) activeNav.classList.add('text-purple-600', 'dark:text-purple-400');
        
        const titles = { dashboard: 'Dashboard', profile: 'Settings', 'add-invoice': 'Create Invoice', 'view-invoice': 'Invoice Details' };
        document.getElementById('app-title').innerText = titles[tab] || 'OmniInvoice';
        
        document.getElementById('main-content').innerHTML = renderPage(tab);
        lucide.createIcons();
        
        if (tab === 'add-invoice') {
            window.updateShiftDefaults(); 
            window.runInvoiceCalculation();
            setTimeout(window.applyInvoiceScaling, 50);
        } else if (tab === 'view-invoice') {
            setTimeout(window.applyInvoiceScaling, 50);
        }
        
        window.updateThemeIcon();
        window.scrollTo(0,0);
    }

    window.toggleTheme = () => { 
        const isDark = document.documentElement.classList.toggle('dark'); 
        localStorage.setItem('inv_theme', isDark ? 'dark' : 'light'); 
        window.updateThemeIcon(); 
    }
    
    window.updateThemeIcon = () => { 
        const i = document.getElementById('theme-icon'); 
        if (i) { 
            i.setAttribute('data-lucide', document.documentElement.classList.contains('dark') ? 'sun' : 'moon'); 
            lucide.createIcons(); 
        } 
    }

    window.applyInvoiceScaling = () => {
        const wrapper = document.querySelector('.invoice-wrapper');
        const card = document.getElementById('printable-invoice');
        if (!wrapper || !card) return;
        const wrapperWidth = wrapper.clientWidth - 20; 
        const originalWidth = 800; 
        if (wrapperWidth < originalWidth) {
            const scale = wrapperWidth / originalWidth;
            card.style.transform = `scale(${scale})`;
            wrapper.style.height = `${card.offsetHeight * scale + 20}px`; 
        } else {
            card.style.transform = 'scale(1)';
            wrapper.style.height = `${card.offsetHeight + 20}px`;
        }
    }
    window.addEventListener('resize', () => { if (document.getElementById('printable-invoice')) window.applyInvoiceScaling(); });

    window.viewInvoice = (id) => {
        window.viewingInvoiceId = id;
        window.switchTab('view-invoice');
    }

    function generateInvoiceCardHTML(inv, profile) {
        const sunPrice = (inv.shift && inv.shift.includes("B SHIFT")) ? 1730 : 2115;
        const sunTotalAmount = inv.sundays * sunPrice;
        const subTotalText = inv.subTotal || (inv.rate + sunTotalAmount);
        
        const descParts = inv.shift ? inv.shift.split(' (') : ['PACKAGE', ')'];
        const pkgName = descParts[0];
        const shiftName = descParts[1] ? '(' + descParts[1] : '';
        const sDateStr = inv.startDate ? inv.startDate.split('-').reverse().join('/') : '';
        const eDateStr = inv.endDate ? inv.endDate.split('-').reverse().join('/') : '';

        // Safely fallback Client/Company name
        const displayClient = inv.client || "CLIENT NAME";

        return `
        <div class="invoice-card" id="printable-invoice">
            <div class="header-section">
                <div class="logo-box">
                    <img src="http://googleusercontent.com/image_collection/image_retrieval/8564286994582804978_0" style="width: 140px; height: 100px; object-fit: cover; border: 1px solid #eee;">
                </div>
                <div style="text-align: right;">
                    <h1 class="owner-text" id="vOwnerName">${profile.name || ''}</h1>
                    <p style="margin: 5px 0; color: #444; font-weight: 700;" id="vPhone">${profile.phone || ''}</p>
                    <div class="label-tag" id="vInvIdDisplay">${inv.id}</div>
                </div>
            </div>

            <div class="inv-label-middle">INVOICE</div>

            <div class="grid-2">
                <div class="box-left">
                    <span class="label-tag">Bill To</span><br>
                    <strong id="vBillToComp" style="font-size: 22px; color: var(--brand-color);">${displayClient}</strong>
                </div>
                <div class="box-right">
                    <span class="label-tag">Trip Details</span><br>
                    <strong id="vVehDisplay">${inv.vehName}</strong><br>
                    VEHICLE NO: <span id="vVehNumDisplay">${inv.vehNum}</span><br>
                    START DATE: <span id="vStartDate">${sDateStr}</span><br>
                    END DATE: <span id="vEndDate">${eDateStr}</span>
                </div>
            </div>

            <table class="table-box">
                <thead>
                    <tr>
                        <th class="text-left" style="width: 45%;">Description</th>
                        <th class="text-center">KM</th>
                        <th class="text-center">DAYS</th>
                        <th class="text-center">SUNDAYS</th>
                        <th class="text-center">RATE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-left" id="vDesc">
                            ${pkgName}<br>
                            <span style="font-size: 14px; font-weight: bold; color: #222;">${shiftName}</span>
                        </td>
                        <td class="text-center" id="vKm">${inv.km}</td>
                        <td class="text-center" id="vDays">${inv.days}</td>
                        <td class="text-center" id="vOff">${inv.sundays}</td>
                        <td class="text-center" id="vAmount">${Math.round(inv.rate).toLocaleString('en-IN')}</td>
                    </tr>
                </tbody>
            </table>

            <div class="footer-grid">
                <div class="terms-box">
                    <strong style="display:block; margin-bottom:5px;">TERMS & CONDITIONS:</strong>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">1. TOLL, PARKING & TAXES EXTRA AS ACTUALS.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">2. DRIVER ALLOWANCE BY CLIENT IF OUTSTATION.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">3. USAGE WITHIN SPECIFIED KM LIMIT.</span>
                    <span style="display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">4. SUBJECT TO LOCAL JURISDICTION ONLY.</span>
                </div>
                <div class="totals-box">
                    <div class="total-row"><span>PACKAGE BASE</span><span id="vPkgBase">₹ ${Math.round(inv.rate).toLocaleString('en-IN')}</span></div>
                    <div class="total-row"><span>SUNDAYS TOTAL x<span id="vSunCount">${inv.sundays}</span></span><span id="vSunTotalAmount">₹ ${Math.round(sunTotalAmount).toLocaleString('en-IN')}</span></div>
                    <div class="total-row highlight-total"><span>SUB TOTAL</span><span id="vSub">₹ ${Math.round(subTotalText).toLocaleString('en-IN')}</span></div>
                </div>
            </div>

            <div style="margin-top: 80px; display: flex; justify-content: space-between; align-items: flex-end;">
                <div style="font-size: 11px; color: #777; font-weight:bold;">SYSTEM GENERATED INVOICE</div>
                <div style="text-align: center; width: 250px;">
                    <span class="font-signature" style="font-size: 32px; color: #000; display: block; margin-bottom: 5px; text-transform:none;" id="vSignName">${profile.name || ''}</span>
                    <div style="border-top: 1.5px solid #000; padding-top: 5px;">
                        <small style="font-size: 10px; text-transform: uppercase; color: #555; font-weight: 700;">Authorized Signatory</small>
                    </div>
                </div>
            </div>
        </div>
        `;
    }

    function renderPage(tab) {
        const invoices = window.appData.invoices;
        const profile = window.appData.profile;
        
        if (tab === 'dashboard') {
            const totalRevs = invoices.reduce((sum, i) => sum + (i.subTotal || 0), 0);
            
            let html = `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="stat-card glass-card rounded-[5px] flex flex-col justify-center py-4">
                        <p class="font-bold text-slate-500 text-[11px] truncate">TOTAL INVOICES</p>
                        <h3 class="font-black text-2xl text-slate-800 dark:text-white truncate">${invoices.length}</h3>
                    </div>
                    <div class="stat-card bg-purple-600 text-white rounded-[5px] border-none shadow-md flex flex-col justify-center py-4">
                        <p class="font-bold opacity-80 text-[11px] truncate">TOTAL REVENUE</p>
                        <h3 class="font-black text-2xl truncate">${fmt(totalRevs)}</h3>
                    </div>
                </div>
                
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="font-black text-sm text-slate-400 truncate">RECENT INVOICES</h3>
                </div>
                <div class="space-y-3 pb-4">
            `;
            
            if (invoices.length === 0) {
                html += `<div class="text-center py-10 glass-card rounded-[5px]"><i data-lucide="receipt" class="w-10 h-10 mx-auto text-slate-300 mb-2"></i><p class="text-sm font-bold text-slate-500">No invoices yet.</p></div>`;
            } else {
                [...invoices].reverse().forEach(inv => {
                    html += `
                    <div onclick="viewInvoice('${inv.id}')" class="glass-card p-4 rounded-[5px] flex justify-between items-center gap-2 cursor-pointer hover:border-purple-400 transition-colors">
                        <div class="min-w-0 flex-1">
                            <h4 class="font-black text-base truncate">${inv.client}</h4>
                            <p class="font-bold text-sm text-purple-600 mt-1 truncate">${inv.id} • ${inv.startDate}</p>
                        </div>
                        <div class="text-right flex-shrink-0">
                            <h3 class="font-black text-base text-emerald-600">${fmt(inv.subTotal)}</h3>
                        </div>
                    </div>`;
                });
            }
            html += `</div>`;
            return html;
        }

        if (tab === 'view-invoice') {
            const inv = invoices.find(i => i.id === window.viewingInvoiceId);
            if(!inv) return `<div class="text-center p-10 font-bold text-red-500">Invoice Not Found.</div>`;
            
            return `
                <div class="flex items-center justify-between mb-4 no-print gap-2">
                    <button onclick="switchTab('dashboard')" class="px-4 py-2 flex items-center gap-2 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-[5px] font-bold text-sm">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
                    </button>
                    <button onclick="window.print()" class="px-4 py-2 flex items-center gap-2 bg-purple-600 text-white rounded-[5px] font-bold text-sm shadow">
                        <i data-lucide="printer" class="w-4 h-4"></i> Print
                    </button>
                </div>
                <div class="invoice-wrapper">
                    ${generateInvoiceCardHTML(inv, profile)}
                </div>
            `;
        }

        if (tab === 'profile') {
            const avatarUrl = window.currentUser?.photoURL || "https://api.dicebear.com/7.x/avataaars/svg?seed=Gaurav";
            return `
                <div class="space-y-4">
                    <div class="glass-card rounded-[5px] p-6 text-center border border-slate-200 dark:border-slate-700">
                        <div class="w-20 h-20 mx-auto bg-purple-100 rounded-full border-[3px] border-purple-500 overflow-hidden mb-3">
                            <img src="${avatarUrl}" class="w-full h-full">
                        </div>
                        <h2 class="font-black text-base uppercase truncate">${window.currentUser?.displayName || 'Settings'}</h2>
                        <p class="text-xs text-slate-500 font-bold">${window.currentUser?.email}</p>
                    </div>
                    <div class="glass-card rounded-[5px] p-4 border border-slate-200 dark:border-slate-700 space-y-4">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-black text-xs text-slate-400 tracking-widest">INVOICE DETAILS</h3>
                            <span class="text-[10px] font-bold text-green-500 flex items-center gap-1"><i data-lucide="check-circle" class="w-3 h-3"></i> Auto-saved</span>
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase">Owner Name (Signature)</label>
                            <input type="text" id="p-name" value="${profile.name || ''}" oninput="saveProfile()" class="field-input mt-1.5">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-slate-500 uppercase">Phone Number</label>
                            <input type="text" id="p-phone" value="${profile.phone || ''}" oninput="saveProfile()" class="field-input mt-1.5">
                        </div>
                    </div>
                    
                    <div class="glass-card rounded-[5px] p-4 text-center border border-slate-200 dark:border-slate-700">
                         <button onclick="logoutUser()" class="text-slate-600 dark:text-slate-300 font-bold text-sm uppercase flex items-center justify-center w-full">
                            <i data-lucide="log-out" class="w-4 h-4 inline mr-2"></i> Sign Out of Google
                         </button>
                    </div>
                </div>
            `;
        }

        if (tab === 'add-invoice') {
            const nextId = 'INV-' + String(invoices.length + 1).padStart(3, '0');
            
            // Generate a blank placeholder invoice object for the preview
            const previewInv = {
                id: nextId, startDate: today(), endDate: today(), client: "SMS GROUP",
                shift: 'PACKAGE 45000 (B SHIFT)', vehName: 'TOYOTA RUMION', vehNum: 'GJ-01-LT-5558',
                km: 1280, days: 16, sundays: 2, rate: 24740, subTotal: 28200
            };

            return `
            <div class="editor-dashboard glass-card rounded-[5px] p-4 mb-5 w-full">
                <h3 class="font-black text-sm text-purple-600 tracking-widest mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">INVOICE PARAMETERS</h3>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Company / Bill To</label>
                        <input type="text" id="iBiz" value="SMS GROUP" oninput="runInvoiceCalculation()" class="field-input text-xs" placeholder="Client Company">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Shift Selection</label>
                        <select id="iDesc" onchange="updateShiftDefaults(); runInvoiceCalculation()" class="field-input text-xs">
                            <option value="PACKAGE 45000 (B SHIFT)">B SHIFT</option>
                            <option value="PACKAGE 55000 (C SHIFT)">C SHIFT</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Invoice No.</label>
                        <input type="text" id="iInvNum" value="${nextId}" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Start Date</label>
                        <input type="date" id="iStartDate" value="${today()}" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">End Date</label>
                        <input type="date" id="iEndDate" value="${today()}" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Veh. Name</label>
                        <input type="text" id="iVehName" value="TOYOTA RUMION" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Veh. Number</label>
                        <input type="text" id="iVehNum" value="GJ-01-LT-5558" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">KM Limit</label>
                        <input type="number" id="iKm" value="1280" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Days worked</label>
                        <input type="number" id="iDays" value="16" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Sundays</label>
                        <input type="number" id="iOff" value="2" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Pkg Rate (₹)</label>
                        <input type="number" id="iRate" value="24740" oninput="runInvoiceCalculation()" class="field-input text-xs">
                    </div>
                    <div class="flex flex-col cursor-not-allowed opacity-60">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-1">Signature</label>
                        <input type="text" id="iSignName" value="${profile.name || ''}" disabled class="field-input text-xs bg-slate-100">
                    </div>
                </div>

                <div class="flex gap-3 mt-5 border-t border-slate-100 dark:border-slate-700 pt-4">
                    <button onclick="saveAndPrintInvoice()" class="flex-1 btn-primary bg-purple-600 text-white flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i> Save to Database
                    </button>
                </div>
            </div>
            
            <h3 class="font-black text-sm text-slate-400 tracking-widest mb-3 text-center uppercase no-print">Live Preview</h3>
            
            <div class="invoice-wrapper" id="live-preview-container">
                ${generateInvoiceCardHTML(previewInv, profile)}
            </div>`;
        }
        
        return '';
    }

    // Interactive Logic Functions
    window.saveProfile = () => {
        if (!window.currentUser) return;
        const p = {
            name: document.getElementById('p-name').value,
            phone: document.getElementById('p-phone').value
        };
        // Update local state instantly
        window.appData.profile = p;
        // Push silently to Firebase
        set(ref(database, `users/${window.currentUser.uid}/profile`), p);
    }

    window.updateShiftDefaults = () => {
        const desc = document.getElementById('iDesc').value;
        document.getElementById('iKm').value = (desc.includes("B SHIFT")) ? 1280 : 2240;
    }

    window.runInvoiceCalculation = () => {
        const desc = document.getElementById('iDesc').value;
        const km = document.getElementById('iKm').value;
        const days = document.getElementById('iDays').value;
        const sundays = parseInt(document.getElementById('iOff').value) || 0;
        const rate = parseFloat(document.getElementById('iRate').value) || 0;
        const vName = document.getElementById('iVehName').value;
        const vNum = document.getElementById('iVehNum').value;
        const sDate = document.getElementById('iStartDate').value;
        const eDate = document.getElementById('iEndDate').value;
        const invNum = document.getElementById('iInvNum').value;

        const sunPrice = (desc.includes("B SHIFT")) ? 1730 : 2115;
        const sunTotal = sundays * sunPrice;
        const subTotal = rate + sunTotal;

        const liveInv = {
            id: invNum, startDate: sDate, endDate: eDate, client: document.getElementById('iBiz').value,
            shift: desc, vehName: vName, vehNum: vNum, km: km, days: days, sundays: sundays, 
            rate: rate, subTotal: subTotal
        };

        // Re-render just the preview part using the template
        document.getElementById('live-preview-container').innerHTML = generateInvoiceCardHTML(liveInv, window.appData.profile);
        window.applyInvoiceScaling();
    }

    window.saveAndPrintInvoice = () => {
        if(!window.currentUser) return alert("You must be logged in to save.");
        
        const desc = document.getElementById('iDesc').value;
        const sundays = parseInt(document.getElementById('iOff').value) || 0;
        const rate = parseFloat(document.getElementById('iRate').value) || 0;
        const sunPrice = (desc.includes("B SHIFT")) ? 1730 : 2115;
        const invNum = document.getElementById('iInvNum').value;
        
        const invoiceData = {
            id: invNum,
            startDate: document.getElementById('iStartDate').value,
            endDate: document.getElementById('iEndDate').value,
            client: document.getElementById('iBiz').value, // Reads from the new input field
            shift: desc,
            vehName: document.getElementById('iVehName').value,
            vehNum: document.getElementById('iVehNum').value,
            km: document.getElementById('iKm').value,
            days: document.getElementById('iDays').value,
            sundays: sundays,
            rate: rate,
            sunTotal: sundays * sunPrice,
            subTotal: rate + (sundays * sunPrice),
            createdAt: new Date().toISOString()
        };
        
        // Save to Firebase Database
        const dbRef = ref(database, `users/${window.currentUser.uid}/invoices/${invNum}`);
        set(dbRef, invoiceData).then(() => {
            window.viewInvoice(invNum);
        }).catch((err) => {
            console.error("Save Error:", err);
            alert("Failed to save invoice.");
        });
    }

    window.logoutUser = () => {
        if(confirm("Are you sure you want to sign out?")) {
            signOut(auth);
        }
    };
</script>
</body>
</html>
